name: CI/CD ShopStream

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install flake8 -r requirements.txt -r api/requirements.txt
      - run: flake8 . --max-line-length=120 --extend-exclude=.git,__pycache__,.venv,data,data_sample

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install pytest pytest-cov -r requirements.txt -r api/requirements.txt
      - run: pytest api/tests/ --cov=api --cov-report=term --cov-fail-under=65

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m venv .venv
      - run: . .venv/bin/activate && python -m pip install --upgrade pip
      - run: . .venv/bin/activate && pip install -r api/requirements.txt
      - name: Deploy API
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1
        run: . .venv/bin/activate && cd api && zappa update production || zappa deploy production
